<body>

    <div class="page-body">

    books.forEach((book, i) => {
      const li = document.createElement('li');
      li.className = 'item-row';
      li.innerHTML = '<span class="item-num">' + (i + 1) + '</span><span class="item-title">' + book.title + '</span><span class="item-sub">' + book.author + '</span>';
      listEl.appendChild(li);
    });
    countEl.textContent = books.length + ' books';

</body>
</html>
