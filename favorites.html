    function initList(items, listId, countId, searchId, panelId, titleKey, subKey, noun) {
      const listEl = document.getElementById(listId);
      const countEl = document.getElementById(countId);
      const searchEl = document.getElementById(searchId);
      const panel = document.getElementById(panelId);
      let activeTag = 'all';

      function render() {
        const q = searchEl.value.toLowerCase();
        let n = 0;
        listEl.innerHTML = '';
        items.forEach(item => {
          const matchTag = activeTag === 'all' || item.tags.includes(activeTag);
          const matchQ = !q || item[titleKey].toLowerCase().includes(q) || item[subKey].toLowerCase().includes(q);
          if (!matchTag || !matchQ) return;
          n++;
          const li = document.createElement('li');
          li.className = 'item-row';
          li.innerHTML = `<span class="item-num">${n}</span><span class="item-title">${item[titleKey]}</span><span class="item-sub">${item[subKey]}</span>`;
          listEl.appendChild(li);
        });
        countEl.textContent = `${n} ${noun}${n !== 1 ? 's' : ''}`;
      }

      panel.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          panel.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeTag = btn.dataset.tag;
          render();
        });
      });

      searchEl.addEventListener('input', render);
      render();
    }

    initList(books, 'book-list', 'book-count', 'book-search', 'panel-books', 'title', 'author', 'book');
    initList(movies, 'movie-list', 'movie-count', 'movie-search', 'panel-movies', 'title', 'director', 'film');

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
      });
    });
